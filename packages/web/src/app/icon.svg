<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e9d5ff;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Globe circle -->
  <circle cx="256" cy="220" r="120" fill="none" stroke="url(#globe)" stroke-width="6" opacity="0.9"/>
  <!-- Latitude lines -->
  <ellipse cx="256" cy="220" rx="120" ry="40" fill="none" stroke="white" stroke-width="3" opacity="0.4"/>
  <ellipse cx="256" cy="220" rx="120" ry="80" fill="none" stroke="white" stroke-width="3" opacity="0.3"/>
  <!-- Longitude lines -->
  <ellipse cx="256" cy="220" rx="40" ry="120" fill="none" stroke="white" stroke-width="3" opacity="0.4"/>
  <ellipse cx="256" cy="220" rx="80" ry="120" fill="none" stroke="white" stroke-width="3" opacity="0.3"/>
  <!-- Vertical meridian -->
  <line x1="256" y1="100" x2="256" y2="340" stroke="white" stroke-width="3" opacity="0.3"/>
  <!-- Horizontal equator -->
  <line x1="136" y1="220" x2="376" y2="220" stroke="white" stroke-width="3" opacity="0.3"/>
  <!-- Connection dots on globe -->
  <circle cx="200" cy="180" r="8" fill="white" opacity="0.9" filter="url(#glow)"/>
  <circle cx="310" cy="200" r="8" fill="white" opacity="0.9" filter="url(#glow)"/>
  <circle cx="240" cy="260" r="8" fill="white" opacity="0.9" filter="url(#glow)"/>
  <circle cx="280" cy="160" r="6" fill="#e9d5ff" opacity="0.8"/>
  <circle cx="180" cy="230" r="6" fill="#e9d5ff" opacity="0.8"/>
  <!-- Connection lines between dots -->
  <line x1="200" y1="180" x2="310" y2="200" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="310" y1="200" x2="240" y2="260" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="200" y1="180" x2="240" y2="260" stroke="white" stroke-width="2" opacity="0.3"/>
  <!-- Subtitle lines below globe -->
  <rect x="146" y="365" width="220" height="8" rx="4" fill="white" opacity="0.9"/>
  <rect x="176" y="385" width="160" height="8" rx="4" fill="white" opacity="0.6"/>
  <rect x="196" y="405" width="120" height="8" rx="4" fill="white" opacity="0.35"/>
</svg>
