version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stremio-ai-postgres
    environment:
      POSTGRES_USER: stremio
      POSTGRES_PASSWORD: stremio_dev
      POSTGRES_DB: stremio_ai_subs
    ports:
      - '5466:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-umami-db.sh:/docker-entrypoint-initdb.d/20-create-umami-db.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stremio']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stremio-ai-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: stremio-ai-umami
    environment:
      DATABASE_URL: postgresql://stremio:stremio_dev@postgres:5432/umami
      DISABLE_TELEMETRY: '1'
    ports:
      - '3005:3000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/heartbeat || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
