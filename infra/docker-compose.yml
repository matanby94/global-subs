version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stremio-ai-postgres
    environment:
      POSTGRES_USER: stremio
      POSTGRES_PASSWORD: stremio_dev
      POSTGRES_DB: stremio_ai_subs
    ports:
      - '5466:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stremio']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stremio-ai-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
