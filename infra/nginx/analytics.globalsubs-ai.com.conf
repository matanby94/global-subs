# Nginx vhost for Umami analytics (analytics.globalsubs-ai.com)
# Install: sudo cp infra/nginx/analytics.globalsubs-ai.com.conf /etc/nginx/sites-available/
#          sudo ln -s /etc/nginx/sites-available/analytics.globalsubs-ai.com.conf /etc/nginx/sites-enabled/
#          sudo certbot --nginx -d analytics.globalsubs-ai.com
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name analytics.globalsubs-ai.com;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Umami real-time)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
