version: '3.8'

# Production docker-compose for GlobalSubs
# Usage:
#   1. Copy .env.example to .env and fill in production values
#   2. docker compose -f docker-compose.prod.yml up -d
#   3. Apply migrations: docker compose -f docker-compose.prod.yml exec api sh -c 'for f in /app/migrations/*.sql; do PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U $POSTGRES_USER -d $POSTGRES_DB < "$f"; done'

services:
  postgres:
    image: postgres:16-alpine
    container_name: globalsubs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stremio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-stremio_ai_subs}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../infra/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-stremio}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: globalsubs-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: ..
      dockerfile: packages/api/Dockerfile
    container_name: globalsubs-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '${API_PORT:-3001}:3001'
    environment:
      NODE_ENV: production
      API_PORT: '3001'
      DATABASE_URL: postgresql://${POSTGRES_USER:-stremio}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stremio_ai_subs}
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      S3_ENDPOINT: ${S3_ENDPOINT:?S3_ENDPOINT is required}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
      S3_BUCKET: ${S3_BUCKET:-stremio-ai-subs}
      S3_REGION: ${S3_REGION:-us-east-1}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  workers:
    build:
      context: ..
      dockerfile: packages/workers/Dockerfile
    container_name: globalsubs-workers
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-stremio}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stremio_ai_subs}
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET:-stremio-ai-subs}
      S3_REGION: ${S3_REGION:-us-east-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      DEEPL_API_KEY: ${DEEPL_API_KEY:-}
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  addon:
    build:
      context: ..
      dockerfile: packages/addon/Dockerfile
    container_name: globalsubs-addon
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${ADDON_PORT:-7000}:7000'
    environment:
      NODE_ENV: production
      PORT: '7000'
      DATABASE_URL: postgresql://${POSTGRES_USER:-stremio}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stremio_ai_subs}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET:-stremio-ai-subs}
      S3_REGION: ${S3_REGION:-us-east-1}
      API_URL: http://api:3001
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  scrapers:
    build:
      context: ..
      dockerfile: packages/scrapers/Dockerfile
    container_name: globalsubs-scrapers
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-stremio}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stremio_ai_subs}
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET:-stremio-ai-subs}
      S3_REGION: ${S3_REGION:-us-east-1}
      OPENSUBTITLES_API_KEY: ${OPENSUBTITLES_API_KEY:-}
      OPENSUBTITLES_USERNAME: ${OPENSUBTITLES_USERNAME:-}
      OPENSUBTITLES_PASSWORD: ${OPENSUBTITLES_PASSWORD:-}
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  web:
    build:
      context: ..
      dockerfile: packages/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_ADDON_URL: ${NEXT_PUBLIC_ADDON_URL:-http://localhost:7000}
    container_name: globalsubs-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '${WEB_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
