name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stremio
          POSTGRES_PASSWORD: stremio_dev
          POSTGRES_DB: stremio_ai_subs
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run database migrations
        run: |
          for f in infra/migrations/*.sql; do
            echo "Applying $f..."
            PGPASSWORD=stremio_dev psql -h localhost -U stremio -d stremio_ai_subs < "$f"
          done

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Run unit tests
        run: pnpm run test

      - name: Install Playwright browsers
        run: pnpm --filter e2e exec playwright install --with-deps

      - name: Start services
        run: |
          pnpm --filter @stremio-ai-subs/api run dev &
          pnpm --filter @stremio-ai-subs/web run dev &
          sleep 15
        env:
          DATABASE_URL: postgresql://stremio:stremio_dev@localhost:5432/stremio_ai_subs
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
          JWT_SECRET: ci-test-secret-minimum-16-chars
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin
          S3_BUCKET: stremio-ai-subs
          OPENAI_API_KEY: sk-test-ci-dummy
          CORS_ORIGIN: http://localhost:3000

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          DATABASE_URL: postgresql://stremio:stremio_dev@localhost:5432/stremio_ai_subs
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
          JWT_SECRET: ci-test-secret-minimum-16-chars
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin
          S3_BUCKET: stremio-ai-subs

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: packages/e2e/artifacts/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: packages/e2e/artifacts/test-results/
          retention-days: 30
