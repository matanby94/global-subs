name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stremio
          POSTGRES_PASSWORD: stremio_dev
          POSTGRES_DB: stremio_ai_subs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stremio"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run database migrations
        run: |
          for f in infra/migrations/*.sql; do
            echo "Applying $f..."
            PGPASSWORD=stremio_dev psql -h localhost -U stremio -d stremio_ai_subs < "$f"
          done

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Run unit tests
        run: pnpm run test

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 178.104.8.231
          username: ${{ secrets.GLOBAL_SUBS_DEPLOY_USER }}
          key: ${{ secrets.GLOBAL_SUBS_DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -euo pipefail
            APP_DIR="/app"
            cd "$APP_DIR"

            echo "==> Deploying GlobalSubs at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Build and restart
            COMPOSE="docker compose --env-file .env -f infra/docker-compose.prod.yml"

            echo "==> Building Docker images..."
            $COMPOSE build --parallel

            echo "==> Applying database migrations..."
            $COMPOSE up -d postgres
            sleep 5

            # Ensure umami database exists (for analytics)
            $COMPOSE exec -T postgres sh -c \
              'PGPASSWORD=$POSTGRES_PASSWORD psql -U $POSTGRES_USER -d $POSTGRES_DB -c "SELECT '"'"'CREATE DATABASE umami'"'"' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '"'"'umami'"'"')\\gexec" 2>&1 || true'

            $COMPOSE exec -T postgres sh -c \
              'for f in /docker-entrypoint-initdb.d/*.sql; do
                echo "Applying $f..."
                PGPASSWORD=$POSTGRES_PASSWORD psql -U $POSTGRES_USER -d $POSTGRES_DB -f "$f" 2>&1 || true
              done'

            echo "==> Starting all services..."
            $COMPOSE up -d

            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "==> Waiting for health checks..."
            sleep 10

            # Verify services are running
            RUNNING=$($COMPOSE ps --status running --format json | wc -l)
            TOTAL=$($COMPOSE ps --format json | wc -l)
            echo "==> Services running: $RUNNING/$TOTAL"

            if [ "$RUNNING" -lt "$TOTAL" ]; then
              echo "ERROR: Not all services are healthy!"
              $COMPOSE ps
              exit 1
            fi

            echo "==> Deploy complete!"
